<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Registration</title>
  <base href="http://localhost:8080/">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #171717; /* Черный фон */
      color: #ffffff; /* Белый цвет текста */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 400px;
      padding: 20px;
      background-color: #1f1f1f; /* Цвет панели регистрации */
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 10px;
      font-weight: bold;
    }

    input {
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #2d2d2d; /* Цвет рамки поля ввода */
      border-radius: 5px;
      background-color: #282828; /* Цвет поля ввода */
      color: #ffffff; /* Белый цвет текста в поле ввода */
    }

    input:focus {
      outline: none;
    }

    button {
      padding: 10px 20px;
      background-color: #00a0df; /* Цвет кнопки */
      color: #ffffff; /* Белый цвет текста на кнопке */
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #007bb6; /* Цвет при наведении */
    }

  </style>
</head>
<body>
  <div class="container">
    <h2><a href="/login">Авторизация</a> / Регистрация</h2>
    <form id="registrationForm">
      <label for="username">Имя:</label>
      <input type="text" id="username" name="username" required>
      <label for="password">Почта:</label>
      <input type="password" id="password" name="password" required>
      <label for="password">Пароль:</label>
      <input type="password" id="password" name="password" required>
      <label for="password">Повторите пароль:</label>
      <input type="password" id="password" name="password" required>
      <button type="button" id="register">Зарегистрироваться</button> <!-- Changed type from "sendButton" to "button" -->
    </form>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.3.1/socket.io.js"></script>
  <script>
    const socket = io('/reg');
    //Получение данных из формы
    const regName = document.getElementById('username')
    const regPassword = document.getElementById('password')
    const registerButton = document.getElementById('register') 

    registerButton.addEventListener('click', saveData) 

    function saveData(event){
      document.cookie = `userName=${regName.value}` 
      document.cookie = `userPassword=${regPassword.value}`
      console.log(`В куки записаны поля userName=${regName.value}, userPassword=${regPassword.value}`)
      window.location.href = '/chat'
      
    }
</script>

</body>
</html>
